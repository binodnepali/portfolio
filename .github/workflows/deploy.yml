name: Deploy
on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    permissions:
      id-token: write # Needed for auth with Deno Deploy
      contents: read # Needed to clone the repository

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Build step
        # Retry to ride out transient esm.sh/CDN hiccups (e.g. HTTP 522) while
        # fetching remote dependencies during the build.
        run: |
          n=0
          until [ "$n" -ge 3 ]; do
            deno task build && exit 0
            n=$((n + 1))
            echo "Build attempt $n failed, retrying in 10s..."
            sleep 10
          done
          echo "Build failed after $n attempts"
          exit 1

      - name: Upload to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: "portfolio"
          entrypoint: "main.ts"
          root: ""
