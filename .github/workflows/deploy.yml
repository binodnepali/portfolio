name: Deploy
on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read # Needed to clone the repository

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          # `deno deploy` requires Deno >= 2.4.
          deno-version: v2.x

      - name: Build step
        # Retry to ride out transient esm.sh/CDN hiccups (e.g. HTTP 522) while
        # fetching remote dependencies during the build.
        run: |
          n=0
          until [ "$n" -ge 3 ]; do
            deno task build && exit 0
            n=$((n + 1))
            echo "Build attempt $n failed, retrying in 10s..."
            sleep 10
          done
          echo "Build failed after $n attempts"
          exit 1

      - name: Deploy to Deno Deploy
        # Only deploy on push to main, not on PRs.
        if: github.event_name == 'push'
        env:
          DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
        run: deno deploy --org "${{ vars.DENO_DEPLOY_ORG }}" --app "${{ vars.DENO_DEPLOY_APP }}" --prod
